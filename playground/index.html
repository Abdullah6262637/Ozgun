<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TİLK Dil Playground</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0c10;
            --bg-card: rgba(20, 24, 33, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            
            --color-primary: #00e5ff;    /* Neon Teal */
            --color-secondary: #ff5722;  /* Neon Orange */
            --color-success: #00e676;    /* Emerald Green */
            --color-error: #ff1744;      /* Cyber Pink/Red */
            
            --text-main: #f5f6f9;
            --text-muted: #8a94a6;
            --font-display: 'Outfit', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-display);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Glassmorphism Background Pattern */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, transparent 70%);
            top: 10%;
            left: 5%;
            z-index: -1;
            filter: blur(50px);
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 87, 34, 0.1) 0%, transparent 70%);
            bottom: 10%;
            right: 5%;
            z-index: -1;
            filter: blur(60px);
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 12, 16, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: var(--color-primary);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .example-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        select {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: var(--font-display);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--color-primary);
        }

        /* Main Workspace Layout */
        main {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            flex-grow: 1;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
            max-height: calc(100vh - 85px);
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
        }

        .panel-title {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-primary);
        }

        /* Editor Styles */
        .editor-container {
            position: relative;
            flex-grow: 1;
            display: flex;
        }

        .line-numbers {
            width: 40px;
            padding: 1.5rem 0.5rem;
            text-align: right;
            font-family: var(--font-code);
            font-size: 0.9rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.15);
            border-right: 1px solid var(--border-color);
            user-select: none;
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-code);
            font-size: 0.95rem;
            line-height: 1.5;
            padding: 1.5rem;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        /* Buttons & Actions */
        .btn {
            background: linear-gradient(135deg, var(--color-primary), #00b0ff);
            border: none;
            color: #05050a;
            padding: 0.6rem 1.5rem;
            font-weight: 700;
            font-family: var(--font-display);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Output Tabs Panel */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.1);
        }

        .tab {
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
            background: rgba(0, 229, 255, 0.03);
        }

        .tab-content {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            font-family: var(--font-code);
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .hidden {
            display: none !important;
        }

        /* Terminal styling for console */
        .console-output {
            color: #e0e0e0;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .console-log {
            color: var(--color-success);
        }

        .console-error {
            color: var(--color-error);
            background: rgba(255, 23, 68, 0.05);
            padding: 0.5rem;
            border-radius: 4px;
            border-left: 3px solid var(--color-error);
        }

        /* Token Table styling */
        .token-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-code);
        }

        .token-table th, .token-table td {
            text-align: left;
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .token-table th {
            color: var(--color-primary);
            font-weight: 600;
        }

        .token-table td {
            color: var(--text-main);
        }

        /* AST JSON viewing styling */
        pre {
            white-space: pre-wrap;
            color: #d1d5db;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <div class="logo">TİLK</div>
            <div class="badge">Playground v0.1.0</div>
        </div>
        <div class="example-selector">
            <span style="font-size: 0.9rem; color: var(--text-muted); margin-right: 0.5rem;">Örnek Yükle:</span>
            <select id="exampleSelect">
                <option value="faktöriyel">Recursive Faktöriyel</option>
                <option value="kosul">Koşul Yapısı (ise/değilse)</option>
                <option value="dongu">Döngü Yapıları (iken / aralık)</option>
                <option value="islev">Fonksiyon Tanımı</option>
                <option value="hesap">Matematik & Zaman Kütüphanesi</option>
                <option value="diziler">Dizi & Sonek İndeksleme</option>
                <option value="haritalar">Haritalar & Eleman Güncelleme</option>
                <option value="hata_yonetimi">Türkçe Hata Yönetimi (hata_ise)</option>
                <option value="asenkron">Zarf-Fiil Asenkron Görevler</option>
            </select>
            <button class="btn" id="runBtn" style="margin-left: 1.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Çalıştır
            </button>
        </div>
    </header>

    <main>
        <!-- Left Panel: Editor -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Kod Editörü</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);">dosya: kaynak.oz</div>
            </div>
            <div class="editor-container">
                <div class="line-numbers" id="lineNumbers">1<br>2<br>3<br>4<br>5</div>
                <textarea id="codeEditor" spellcheck="false" autocomplete="off">yazdır("Merhaba Dünya!");</textarea>
            </div>
        </div>

        <!-- Right Panel: Visualizer / Tabs -->
        <div class="panel">
            <div class="tabs">
                <div class="tab active" data-tab="console">Konsol Çıktısı</div>
                <div class="tab" data-tab="ast">Soyut Sözdizimi Ağacı (AST)</div>
                <div class="tab" data-tab="tokens">Sözcük Analizi (Tokens)</div>
            </div>
            
            <!-- Console Tab -->
            <div class="tab-content" id="tabContent-console">
                <div class="console-output" id="consoleOutput">TİLK kodunu çalıştırmak için 'Çalıştır' butonuna basın...</div>
            </div>

            <!-- AST Tab -->
            <div class="tab-content hidden" id="tabContent-ast">
                <pre id="astOutput">AST burada görüntülenecek...</pre>
            </div>

            <!-- Token Tab -->
            <div class="tab-content hidden" id="tabContent-tokens">
                <table class="token-table">
                    <thead>
                        <tr>
                            <th>Tip (Variant)</th>
                            <th>Değer (Sözcük)</th>
                        </tr>
                    </thead>
                    <tbody id="tokenOutput">
                        <tr>
                            <td colspan="2" style="color: var(--text-muted); text-align: center;">Token listesi burada görüntülenecek...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
    import init, { run_tilk_code } from './pkg/oz_wasm.js';

    // UI Elements
    const codeEditor = document.getElementById('codeEditor');
    const lineNumbers = document.getElementById('lineNumbers');
    const runBtn = document.getElementById('runBtn');
    const consoleOutput = document.getElementById('consoleOutput');
    const astOutput = document.getElementById('astOutput');
    const tokenOutput = document.getElementById('tokenOutput');

    // Editor Logic
    function updateLineNumbers() {
        const lines = codeEditor.value.split('\n').length;
        let numbersHTML = '';
        for (let i = 1; i <= lines; i++) {
            numbersHTML += i + '<br>';
        }
        lineNumbers.innerHTML = numbersHTML;
    }
    
    codeEditor.addEventListener('input', updateLineNumbers);
    codeEditor.addEventListener('scroll', () => {
        lineNumbers.scrollTop = codeEditor.scrollTop;
    });
    
    codeEditor.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.selectionStart;
            const end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            updateLineNumbers();
        }
    });
    
    updateLineNumbers();

    // Tab Logic
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.output-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.getAttribute('data-target');
            document.getElementById(target).classList.add('active');
        });
    });

    // WASM Initialization
    runBtn.textContent = 'Yükleniyor...';
    runBtn.disabled = true;

    init().then(() => {
        runBtn.textContent = 'Çalıştır';
        runBtn.disabled = false;
        
        runBtn.addEventListener('click', () => {
            consoleOutput.innerHTML = '';
            astOutput.innerHTML = '<span style="color: var(--text-muted);">WASM entegrasyonu sebebiyle AST ve Token görüntüleyici geçici olarak devre dışı bırakılmıştır. Sadece Çıktı (Console) aktiftir.</span>';
            tokenOutput.innerHTML = '';
            
            const code = codeEditor.value;
            try {
                const result = run_tilk_code(code);
                const logSpan = document.createElement('span');
                
                if (result.includes("HATA:")) {
                    logSpan.className = 'console-error';
                } else {
                    logSpan.className = 'console-log';
                }
                
                logSpan.textContent = result + '\n';
                consoleOutput.appendChild(logSpan);
            } catch (err) {
                const errSpan = document.createElement('span');
                errSpan.className = 'console-error';
                errSpan.textContent = err.toString();
                consoleOutput.appendChild(errSpan);
            }
        });
    });
</script>
</body>
</html>
