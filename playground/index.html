<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TİLK Dil Playground</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0c10;
            --bg-card: rgba(20, 24, 33, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            
            --color-primary: #00e5ff;    /* Neon Teal */
            --color-secondary: #ff5722;  /* Neon Orange */
            --color-success: #00e676;    /* Emerald Green */
            --color-error: #ff1744;      /* Cyber Pink/Red */
            
            --text-main: #f5f6f9;
            --text-muted: #8a94a6;
            --font-display: 'Outfit', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-display);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Glassmorphism Background Pattern */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, transparent 70%);
            top: 10%;
            left: 5%;
            z-index: -1;
            filter: blur(50px);
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 87, 34, 0.1) 0%, transparent 70%);
            bottom: 10%;
            right: 5%;
            z-index: -1;
            filter: blur(60px);
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 12, 16, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: var(--color-primary);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .example-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        select {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: var(--font-display);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--color-primary);
        }

        /* Main Workspace Layout */
        main {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            flex-grow: 1;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
            max-height: calc(100vh - 85px);
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
        }

        .panel-title {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-primary);
        }

        /* Editor Styles */
        .editor-container {
            position: relative;
            flex-grow: 1;
            display: flex;
        }

        .line-numbers {
            width: 40px;
            padding: 1.5rem 0.5rem;
            text-align: right;
            font-family: var(--font-code);
            font-size: 0.9rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.15);
            border-right: 1px solid var(--border-color);
            user-select: none;
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-code);
            font-size: 0.95rem;
            line-height: 1.5;
            padding: 1.5rem;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        /* Buttons & Actions */
        .btn {
            background: linear-gradient(135deg, var(--color-primary), #00b0ff);
            border: none;
            color: #05050a;
            padding: 0.6rem 1.5rem;
            font-weight: 700;
            font-family: var(--font-display);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Output Tabs Panel */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.1);
        }

        .tab {
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
            background: rgba(0, 229, 255, 0.03);
        }

        .tab-content {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            font-family: var(--font-code);
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .hidden {
            display: none !important;
        }

        /* Terminal styling for console */
        .console-output {
            color: #e0e0e0;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .console-log {
            color: var(--color-success);
        }

        .console-error {
            color: var(--color-error);
            background: rgba(255, 23, 68, 0.05);
            padding: 0.5rem;
            border-radius: 4px;
            border-left: 3px solid var(--color-error);
        }

        /* Token Table styling */
        .token-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-code);
        }

        .token-table th, .token-table td {
            text-align: left;
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .token-table th {
            color: var(--color-primary);
            font-weight: 600;
        }

        .token-table td {
            color: var(--text-main);
        }

        /* AST JSON viewing styling */
        pre {
            white-space: pre-wrap;
            color: #d1d5db;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <div class="logo">TİLK</div>
            <div class="badge">Playground v0.1.0</div>
        </div>
        <div class="example-selector">
            <span style="font-size: 0.9rem; color: var(--text-muted); margin-right: 0.5rem;">Örnek Yükle:</span>
            <select id="exampleSelect">
                <option value="faktöriyel">Recursive Faktöriyel</option>
                <option value="kosul">Koşul Yapısı (ise/değilse)</option>
                <option value="dongu">Döngü Yapıları (iken / aralık)</option>
                <option value="islev">Fonksiyon Tanımı</option>
                <option value="hesap">Matematik & Zaman Kütüphanesi</option>
                <option value="diziler">Dizi & Sonek İndeksleme</option>
                <option value="haritalar">Haritalar & Eleman Güncelleme</option>
                <option value="hata_yonetimi">Türkçe Hata Yönetimi (hata_ise)</option>
                <option value="asenkron">Zarf-Fiil Asenkron Görevler</option>
            </select>
            <button class="btn" id="runBtn" style="margin-left: 1.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Çalıştır
            </button>
        </div>
    </header>

    <main>
        <!-- Left Panel: Editor -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Kod Editörü</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);">dosya: kaynak.oz</div>
            </div>
            <div class="editor-container">
                <div class="line-numbers" id="lineNumbers">1<br>2<br>3<br>4<br>5</div>
                <textarea id="codeEditor" spellcheck="false" autocomplete="off">yazdır("Merhaba Dünya!");</textarea>
            </div>
        </div>

        <!-- Right Panel: Visualizer / Tabs -->
        <div class="panel">
            <div class="tabs">
                <div class="tab active" data-tab="console">Konsol Çıktısı</div>
                <div class="tab" data-tab="ast">Soyut Sözdizimi Ağacı (AST)</div>
                <div class="tab" data-tab="tokens">Sözcük Analizi (Tokens)</div>
            </div>
            
            <!-- Console Tab -->
            <div class="tab-content" id="tabContent-console">
                <div class="console-output" id="consoleOutput">TİLK kodunu çalıştırmak için 'Çalıştır' butonuna basın...</div>
            </div>

            <!-- AST Tab -->
            <div class="tab-content hidden" id="tabContent-ast">
                <pre id="astOutput">AST burada görüntülenecek...</pre>
            </div>

            <!-- Token Tab -->
            <div class="tab-content hidden" id="tabContent-tokens">
                <table class="token-table">
                    <thead>
                        <tr>
                            <th>Tip (Variant)</th>
                            <th>Değer (Sözcük)</th>
                        </tr>
                    </thead>
                    <tbody id="tokenOutput">
                        <tr>
                            <td colspan="2" style="color: var(--text-muted); text-align: center;">Token listesi burada görüntülenecek...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- 1. SAMPLES DEFINITIONS ---
        const samples = {
            faktöriyel: `işlev faktöriyel(n) {
    n <= 1 ise {
        döndür 1;
    }
    döndür n * faktöriyel(n - 1);
}

limit = 5;
i, 1'den limit'e dek artarak {
    yazdır(faktöriyel(i));
}`,
            kosul: `sayı = 8;
sayı > 5 ise {
    yazdır("Sayı 5'ten büyüktür.");
} değilse {
    yazdır("Sayı 5 veya daha küçüktür.");
}`,
            dongu: `sayaç = 1;
sayaç <= 3 iken {
    yazdır("sayaç:", sayaç);
    sayaç = sayaç + 1;
}

i, 1'den 5'e dek artarak {
    yazdır("sayaç range:", i);
}`,
            islev: `işlev topla(a, b) {
    döndür a + b;
}

sonuç = topla(10, 20);
yazdır("topla sonucu:", sonuç);`,
            hesap: `karekok_deger = kök(16);
us_deger = üs(2, 3);
mutlak_deger = mutlak(0 - 42);
simdi_zaman = şimdi();

yazdır("Karekök 16:", karekok_deger);
yazdır("2 üssü 3:", us_deger);
yazdır("Mutlak -42:", mutlak_deger);
yazdır("Unix Zaman:", simdi_zaman);`,
            diziler: `dizimiz = [100, 200, 300, 400];
yazdır("Dizi:", dizimiz);
yazdır("Dizinin boyutu:", boyut(dizimiz));

ekle(dizimiz, 500);
yazdır("Eleman eklenmiş hali:", dizimiz);

// Klasik ve Türkçe sonek indeksleme yöntemleri:
yazdır("dizimiz[0]:", dizimiz[0]);
yazdır("dizimiz'in 2'nci elemanı:", dizimiz'in 2'nci elemanı);`,
            hata_yonetimi: `// Hata fırlatma ve yakalama kontrolü:
yazdır("İşlem başlatılıyor...");

hatali_islem = kök(0 - 9) hata_ise {
    yazdır("Hata yakalandı!");
    yazdır("Detay:", hata_mesajı);
    döndür 999;
};

yazdır("Sonuç:", hatali_islem);`,
            asenkron: `işlev hesaplama_gorevi(x, y) {
    uyku(500); // 500 ms simüle et
    döndür x * y;
}

görev = arkaplanda_çalıştır(hesaplama_gorevi, 6, 7);
yazdır("Görev arka planda başlatıldı...");

görev tamamlanınca {
    yazdır("Arka plan görevi bitti!");
    yazdır("Görevin döndürdüğü sonuç:", sonuç);
}`,
            haritalar: `// Haritalar (Maps/Objects) ve Eleman Güncelleme:
haritamız = { "ad": "Tilk", "yas": 3, "sistem": "Göktürk" };
yazdır("İlk Harita:", haritamız);
yazdır("Boyut:", boyut(haritamız));
yazdır("Ad değeri:", haritamız["ad"]);

// Eleman güncelleme (mutation):
haritamız["yas"] = 4;
haritamız["sehir"] = "Ötüken";

yazdır("Güncellenmiş Harita:", haritamız);
yazdır("Yeni Yaş:", haritamız["yas"]);
yazdır("Yeni Şehir:", haritamız["sehir"]);
yazdır("Yeni Boyut:", boyut(haritamız));

// Dizi elemanı güncelleme:
dizi = [10, 20, 30];
yazdır("İlk Dizi:", dizi);
dizi[0] = 99;
yazdır("Güncellenmiş Dizi:", dizi);`
        };

        // --- 2. EDITOR INTERACTION & LINE NUMBERS ---
        const codeEditor = document.getElementById('codeEditor');
        const lineNumbers = document.getElementById('lineNumbers');
        const exampleSelect = document.getElementById('exampleSelect');

        function updateLineNumbers() {
            const lines = codeEditor.value.split('\n').length;
            lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
        }

        codeEditor.addEventListener('input', updateLineNumbers);
        exampleSelect.addEventListener('change', () => {
            codeEditor.value = samples[exampleSelect.value] || '';
            updateLineNumbers();
        });

        // Initialize editor line numbers and initial code
        codeEditor.value = samples.faktöriyel;
        updateLineNumbers();

        // --- 3. TABS SWITCHING ---
        const tabs = document.querySelectorAll('.tab');
        const tabContents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tabContents.forEach(tc => tc.classList.add('hidden'));

                tab.classList.add('active');
                document.getElementById(`tabContent-${tab.dataset.tab}`).classList.remove('hidden');
            });
        });

        // --- 4. COMPILER / ENGINE IMPLEMENTATION IN JS ---
        
        // 4.1 Turkish lowercasing matching rust implementation
        function turkishLowercase(str) {
            let result = '';
            for (let c of str) {
                if (c === 'İ') result += 'i';
                else if (c === 'I') result += 'ı';
                else result += c.toLowerCase();
            }
            return result;
        }

        // 4.2 Token definitions
        const TokenType = {
            Islev: 'Islev', Dondur: 'Dondur', Degilse: 'Degilse',
            Dogru: 'Dogru', Yanlis: 'Yanlis', Bos: 'Bos',
            Assign: 'Assign', Eq: 'Eq', Ne: 'Ne', Lt: 'Lt', Gt: 'Gt', Le: 'Le', Ge: 'Ge',
            Plus: 'Plus', Minus: 'Minus', Mul: 'Mul', Div: 'Div', Mod: 'Mod',
            And: 'And', Or: 'Or',
            LParen: 'LParen', RParen: 'RParen', LBrace: 'LBrace', RBrace: 'RBrace',
            LBracket: 'LBracket', RBracket: 'RBracket',
            Comma: 'Comma', Semicolon: 'Semicolon', Colon: 'Colon',
            HataIse: 'HataIse', Tamamlaninca: 'Tamamlaninca',
            Number: 'Number', String: 'String', Identifier: 'Identifier'
        };

        // 4.3 Lexer
        function tokenize(src) {
            let idx = 0;
            const tokens = [];

            while (idx < src.length) {
                const char = src[idx];

                // Skip spaces, tabs, newlines, and apostrophe (')
                if (/[ \t\n\r']/.test(char)) {
                    idx++;
                    continue;
                }

                // Skip comments
                if (src.startsWith('//', idx)) {
                    while (idx < src.length && src[idx] !== '\n') {
                        idx++;
                    }
                    continue;
                }

                // Operators & symbols
                if (src.startsWith('==', idx)) { tokens.push({ type: TokenType.Eq, val: '==' }); idx += 2; continue; }
                if (src.startsWith('!=', idx)) { tokens.push({ type: TokenType.Ne, val: '!=' }); idx += 2; continue; }
                if (src.startsWith('<=', idx)) { tokens.push({ type: TokenType.Le, val: '<=' }); idx += 2; continue; }
                if (src.startsWith('>=', idx)) { tokens.push({ type: TokenType.Ge, val: '>=' }); idx += 2; continue; }
                if (char === '=') { tokens.push({ type: TokenType.Assign, val: '=' }); idx++; continue; }
                if (char === '<') { tokens.push({ type: TokenType.Lt, val: '<' }); idx++; continue; }
                if (char === '>') { tokens.push({ type: TokenType.Gt, val: '>' }); idx++; continue; }
                if (char === '+') { tokens.push({ type: TokenType.Plus, val: '+' }); idx++; continue; }
                if (char === '-') { tokens.push({ type: TokenType.Minus, val: '-' }); idx++; continue; }
                if (char === '*') { tokens.push({ type: TokenType.Mul, val: '*' }); idx++; continue; }
                if (char === '/') { tokens.push({ type: TokenType.Div, val: '/' }); idx++; continue; }
                if (char === '%') { tokens.push({ type: TokenType.Mod, val: '%' }); idx++; continue; }
                
                if (char === '(') { tokens.push({ type: TokenType.LParen, val: '(' }); idx++; continue; }
                if (char === ')') { tokens.push({ type: TokenType.RParen, val: ')' }); idx++; continue; }
                if (char === '{') { tokens.push({ type: TokenType.LBrace, val: '{' }); idx++; continue; }
                if (char === '}') { tokens.push({ type: TokenType.RBrace, val: '}' }); idx++; continue; }
                if (char === '[') { tokens.push({ type: TokenType.LBracket, val: '[' }); idx++; continue; }
                if (char === ']') { tokens.push({ type: TokenType.RBracket, val: ']' }); idx++; continue; }
                if (char === ',') { tokens.push({ type: TokenType.Comma, val: ',' }); idx++; continue; }
                if (char === ';') { tokens.push({ type: TokenType.Semicolon, val: ';' }); idx++; continue; }
                if (char === ':') { tokens.push({ type: TokenType.Colon, val: ':' }); idx++; continue; }

                // String literals
                if (char === '"') {
                    let end = idx + 1;
                    while (end < src.length && src[end] !== '"') {
                        end++;
                    }
                    if (end >= src.length) throw new Error("Açık kalmış metin sabiti (string literal)");
                    const strVal = src.substring(idx + 1, end);
                    tokens.push({ type: TokenType.String, val: strVal });
                    idx = end + 1;
                    continue;
                }

                // Number literals
                if (/[0-9]/.test(char)) {
                    let end = idx;
                    while (end < src.length && /[0-9.]/.test(src[end])) {
                        end++;
                    }
                    const numStr = src.substring(idx, end);
                    tokens.push({ type: TokenType.Number, val: numStr });
                    idx = end;
                    continue;
                }

                // Identifiers & keywords (Turkish Unicode characters)
                if (/[a-zA-ZçğıişöüÇĞIİŞÖÜ_]/.test(char)) {
                    let end = idx;
                    while (end < src.length && /[a-zA-Z0-9çğıişöüÇĞIİŞÖÜ_]/.test(src[end])) {
                        end++;
                    }
                    const rawVal = src.substring(idx, end);
                    const val = turkishLowercase(rawVal);

                    // Keywords
                    if (val === 'işlev') tokens.push({ type: TokenType.Islev, val });
                    else if (val === 'döndür') tokens.push({ type: TokenType.Dondur, val });
                    else if (val === 'değilse') tokens.push({ type: TokenType.Degilse, val });
                    else if (val === 'doğru') tokens.push({ type: TokenType.Dogru, val });
                    else if (val === 'yanlış') tokens.push({ type: TokenType.Yanlis, val });
                    else if (val === 'boş') tokens.push({ type: TokenType.Bos, val });
                    else if (val === 've') tokens.push({ type: TokenType.And, val });
                    else if (val === 'veya') tokens.push({ type: TokenType.Or, val });
                    else if (val === 'hata_ise') tokens.push({ type: TokenType.HataIse, val });
                    else if (val === 'tamamlanınca' || val === 'tamamlandığında') tokens.push({ type: TokenType.Tamamlaninca, val });
                    else tokens.push({ type: TokenType.Identifier, val });
                    
                    idx = end;
                    continue;
                }

                throw new Error(`Sözcüksel Analiz Hatası: Bilinmeyen karakter '${char}'`);
            }

            return tokens;
        }

        // 4.4 Parser
        class Parser {
            constructor(tokens) {
                this.tokens = tokens;
                this.pos = 0;
            }

            peek() {
                return this.tokens[this.pos] || null;
            }

            next() {
                return this.tokens[this.pos++];
            }

            match(type) {
                const tok = this.peek();
                if (tok && tok.type === type) {
                    return this.next();
                }
                return null;
            }

            expect(type, errMessage) {
                const tok = this.match(type);
                if (!tok) throw new Error(`Sözdizimi Hatası: ${errMessage}. Bulunan: ${JSON.stringify(this.peek())}`);
                return tok;
            }

            // Suffix check matching parser.rs
            matchSuffix(values) {
                const tok = this.peek();
                if (tok && tok.type === TokenType.Identifier && values.includes(tok.val)) {
                    return this.next();
                }
                return null;
            }

            parse() {
                const stmts = [];
                while (this.peek()) {
                    stmts.push(this.parseStatement());
                }
                return stmts;
            }

            parseStatement() {
                const tok = this.peek();
                if (!tok) throw new Error("Beklenmeyen kod sonu");

                // işlev topla(a, b) { ... }
                if (tok.type === TokenType.Islev) {
                    this.next();
                    const name = this.expect(TokenType.Identifier, "İşlev ismi bekleniyordu").val;
                    this.expect(TokenType.LParen, "'(' bekleniyordu");
                    const params = [];
                    if (this.peek() && this.peek().type !== TokenType.RParen) {
                        params.push(this.expect(TokenType.Identifier, "Parametre ismi bekleniyordu").val);
                        while (this.match(TokenType.Comma)) {
                            params.push(this.expect(TokenType.Identifier, "Parametre ismi bekleniyordu").val);
                        }
                    }
                    this.expect(TokenType.RParen, "')' bekleniyordu");
                    const body = this.parseBlock();
                    return { type: 'FnDecl', name, params, body };
                }

                // döndür x;
                if (tok.type === TokenType.Dondur) {
                    this.next();
                    let expr = null;
                    if (this.peek() && this.peek().type !== TokenType.Semicolon) {
                        expr = this.parseExpr();
                    }
                    this.expect(TokenType.Semicolon, "Satır sonu ';' bekleniyordu");
                    return { type: 'Return', expr };
                }

                const expr = this.parseExpr();
                
                if (this.peek() && this.peek().type === TokenType.Identifier && ['ise', 'se'].includes(this.peek().val)) {
                    this.next();
                    const thenBlock = this.parseBlock();
                    let elseBlock = null;
                    if (this.match(TokenType.Degilse)) {
                        elseBlock = this.parseBlock();
                    }
                    return { type: 'If', cond: expr, thenBlock, elseBlock };
                }

                if (this.peek() && this.peek().type === TokenType.Identifier && this.peek().val === 'iken') {
                    this.next();
                    const body = this.parseBlock();
                    return { type: 'While', cond: expr, body };
                }

                if (this.match(TokenType.Tamamlaninca)) {
                    const body = this.parseBlock();
                    return { type: 'Tamamlaninca', gorev: expr, body };
                }

                if (expr.type === 'Identifier' && this.match(TokenType.Comma)) {
                    const startExpr = this.parseExpr();
                    const suffix1 = this.matchSuffix(['dan', 'den', 'tan', 'ten']);
                    if (!suffix1) throw new Error("Aralık döngüsünde 'den/dan/ten/tan' eki bekleniyordu");
                    
                    const endExpr = this.parseExpr();
                    const suffix2 = this.matchSuffix(['a', 'e', 'ya', 'ye']);
                    if (!suffix2) throw new Error("Aralık döngüsünde 'a/e/ya/ye' eki bekleniyordu");

                    const suffix3 = this.matchSuffix(['dek']);
                    if (!suffix3) throw new Error("Aralık döngüsünde 'dek' kelimesi bekleniyordu");

                    let stepDir = 'Artarak';
                    const stepTok = this.matchSuffix(['artarak', 'azalarak']);
                    if (stepTok && stepTok.val === 'azalarak') {
                        stepDir = 'Azalarak';
                    }

                    const body = this.parseBlock();
                    return { type: 'For', var: expr.val, start: startExpr, end: endExpr, stepDir, body };
                }

                if (this.match(TokenType.Assign)) {
                    const valExpr = this.parseExpr();
                    this.expect(TokenType.Semicolon, "Satır sonu ';' bekleniyordu");
                    if (expr.type === 'Identifier') {
                        return { type: 'VarDecl', name: expr.val, val: valExpr };
                    } else if (expr.type === 'Index') {
                        return { type: 'IndexAssignment', array: expr.array, index: expr.index, val: valExpr };
                    } else {
                        throw new Error("HATA: Geçersiz atama hedefi (LHS)");
                    }
                }

                this.expect(TokenType.Semicolon, "Satır sonu ';' bekleniyordu");
                return { type: 'ExprStmt', expr };
            }

            parseBlock() {
                this.expect(TokenType.LBrace, "'{' bekleniyordu");
                const stmts = [];
                while (this.peek() && this.peek().type !== TokenType.RBrace) {
                    stmts.push(this.parseStatement());
                }
                this.expect(TokenType.RBrace, "'}' bekleniyordu");
                return stmts;
            }

            parseExpr() {
                let node = this.parseLogicalOr();
                if (this.match(TokenType.HataIse)) {
                    const body = this.parseBlock();
                    node = { type: 'HataIse', base: node, body };
                }
                return node;
            }

            parseLogicalOr() {
                let node = this.parseLogicalAnd();
                while (this.match(TokenType.Or)) {
                    node = { type: 'Binary', left: node, op: 'Or', right: this.parseLogicalAnd() };
                }
                return node;
            }

            parseLogicalAnd() {
                let node = this.parseEquality();
                while (this.match(TokenType.And)) {
                    node = { type: 'Binary', left: node, op: 'And', right: this.parseEquality() };
                }
                return node;
            }

            parseEquality() {
                let node = this.parseComparison();
                let op;
                while ((op = this.match(TokenType.Eq) || this.match(TokenType.Ne))) {
                    node = { type: 'Binary', left: node, op: op.type, right: this.parseComparison() };
                }
                return node;
            }

            parseComparison() {
                let node = this.parseTerm();
                let op;
                while ((op = this.match(TokenType.Lt) || this.match(TokenType.Gt) || this.match(TokenType.Le) || this.match(TokenType.Ge))) {
                    node = { type: 'Binary', left: node, op: op.type, right: this.parseTerm() };
                }
                return node;
            }

            parseTerm() {
                let node = this.parseFactor();
                let op;
                while ((op = this.match(TokenType.Plus) || this.match(TokenType.Minus))) {
                    node = { type: 'Binary', left: node, op: op.type, right: this.parseFactor() };
                }
                return node;
            }

            parseFactor() {
                let node = this.parseIndexed();
                let op;
                while ((op = this.match(TokenType.Mul) || this.match(TokenType.Div) || this.match(TokenType.Mod))) {
                    node = { type: 'Binary', left: node, op: op.type, right: this.parseIndexed() };
                }
                return node;
            }

            parseIndexed() {
                let node = this.parsePrimary();
                while (true) {
                    if (this.match(TokenType.LBracket)) {
                        const index = this.parseExpr();
                        this.expect(TokenType.RBracket, "']' bekleniyordu");
                        node = { type: 'Index', array: node, index };
                    } else if (this.peek() && this.peek().type === TokenType.Identifier &&
                               ['in', 'ın', 'un', 'ün', 'nin', 'nın', 'nun', 'nün'].includes(this.peek().val)) {
                        this.next();
                        const index = this.parseExpr();
                        const ordinal = this.matchSuffix(['inci', 'ıncı', 'uncu', 'üncü', 'nci', 'ncı', 'ncu', 'ncü']);
                        if (!ordinal) throw new Error("Sonekli dizi erişiminde sıra eki (inci/ıncı/nci...) bekleniyordu");
                        const elem = this.matchSuffix(['elemanı', 'elemani', 'değeri', 'degeri']);
                        if (!elem) throw new Error("Sonekli dizi erişiminde 'elemanı' veya 'değeri' kelimesi bekleniyordu");
                        node = { type: 'Index', array: node, index };
                    } else {
                        break;
                    }
                }
                return node;
            }

            parsePrimary() {
                const tok = this.peek();
                if (!tok) throw new Error("Beklenmeyen kod sonu");

                if (this.match(TokenType.Dogru)) return { type: 'Literal', val: true };
                if (this.match(TokenType.Yanlis)) return { type: 'Literal', val: false };
                if (this.match(TokenType.Bos)) return { type: 'Literal', val: null };
                
                if (this.match(TokenType.LBracket)) {
                    const elements = [];
                    if (this.peek() && this.peek().type !== TokenType.RBracket) {
                        elements.push(this.parseExpr());
                        while (this.match(TokenType.Comma)) {
                            elements.push(this.parseExpr());
                        }
                    }
                    this.expect(TokenType.RBracket, "']' bekleniyordu");
                    return { type: 'Array', elements };
                }

                if (this.match(TokenType.LBrace)) {
                    const pairs = [];
                    if (this.peek() && this.peek().type !== TokenType.RBrace) {
                        const k = this.parseExpr();
                        this.expect(TokenType.Colon, "':' bekleniyordu");
                        const v = this.parseExpr();
                        pairs.push({ key: k, val: v });
                        while (this.match(TokenType.Comma)) {
                            const nextK = this.parseExpr();
                            this.expect(TokenType.Colon, "':' bekleniyordu");
                            const nextV = this.parseExpr();
                            pairs.push({ key: nextK, val: nextV });
                        }
                    }
                    this.expect(TokenType.RBrace, "'}' bekleniyordu");
                    return { type: 'Map', pairs };
                }

                if (tok.type === TokenType.Number) {
                    return { type: 'Literal', val: parseFloat(this.next().val) };
                }
                if (tok.type === TokenType.String) {
                    return { type: 'Literal', val: this.next().val };
                }

                if (tok.type === TokenType.Identifier) {
                    this.next();
                    if (this.match(TokenType.LParen)) {
                        const args = [];
                        if (this.peek() && this.peek().type !== TokenType.RParen) {
                            args.push(this.parseExpr());
                            while (this.match(TokenType.Comma)) {
                                args.push(this.parseExpr());
                            }
                        }
                        this.expect(TokenType.RParen, "')' bekleniyordu");
                        return { type: 'Call', name: tok.val, args };
                    }
                    return { type: 'Identifier', val: tok.val };
                }

                if (this.match(TokenType.LParen)) {
                    const node = this.parseExpr();
                    this.expect(TokenType.RParen, "')' bekleniyordu");
                    return node;
                }

                throw new Error(`Sözdizimi hatası: Beklenmeyen token '${tok.val}'`);
            }
        }

        // 4.4 Static Type Checker (Hindley-Milner)
        class Type {
            static Number = { type: 'Number' };
            static String = { type: 'String' };
            static Boolean = { type: 'Boolean' };
            static Bos = { type: 'Bos' };
            static Array = (inner) => ({ type: 'Array', inner });
            static Map = (inner) => ({ type: 'Map', inner });
            static Function = (params, ret) => ({ type: 'Function', params, ret });
            static Task = (inner) => ({ type: 'Task', inner });
            static Var = (id) => ({ type: 'Var', id });
        }

        class JSTypeEnv {
            constructor(parent = null) {
                this.bindings = new Map();
                this.parent = parent;
            }
            get(name) {
                if (this.bindings.has(name)) return this.bindings.get(name);
                if (this.parent) return this.parent.get(name);
                return null;
            }
            set(name, scheme) {
                this.bindings.set(name, scheme);
            }
        }

        class JSTypeChecker {
            constructor() {
                this.nextVar = 0;
                this.substitutions = new Map();
            }

            newVar() {
                return this.nextVar++;
            }

            resolve(t) {
                if (t.type === 'Var') {
                    if (this.substitutions.has(t.id)) {
                        return this.resolve(this.substitutions.get(t.id));
                    }
                }
                if (t.type === 'Array') {
                    return { type: 'Array', inner: this.resolve(t.inner) };
                }
                if (t.type === 'Map') {
                    return { type: 'Map', inner: this.resolve(t.inner) };
                }
                if (t.type === 'Task') {
                    return { type: 'Task', inner: this.resolve(t.inner) };
                }
                if (t.type === 'Function') {
                    return {
                        type: 'Function',
                        params: t.params.map(p => this.resolve(p)),
                        ret: this.resolve(t.ret)
                    };
                }
                return t;
            }

            occursIn(varId, t) {
                const resolved = this.resolve(t);
                if (resolved.type === 'Var') return resolved.id === varId;
                if (resolved.type === 'Array' || resolved.type === 'Map' || resolved.type === 'Task') {
                    return this.occursIn(varId, resolved.inner);
                }
                if (resolved.type === 'Function') {
                    return resolved.params.some(p => this.occursIn(varId, p)) || this.occursIn(varId, resolved.ret);
                }
                return false;
            }

            typeEq(t1, t2) {
                const r1 = this.resolve(t1);
                const r2 = this.resolve(t2);
                if (r1.type !== r2.type) return false;
                if (r1.type === 'Var') return r1.id === r2.id;
                if (r1.type === 'Array' || r1.type === 'Map' || r1.type === 'Task') {
                    return this.typeEq(r1.inner, r2.inner);
                }
                if (r1.type === 'Function') {
                    if (r1.params.length !== r2.params.length) return false;
                    for (let i = 0; i < r1.params.length; i++) {
                        if (!this.typeEq(r1.params[i], r2.params[i])) return false;
                    }
                    return this.typeEq(r1.ret, r2.ret);
                }
                return true;
            }

            unify(t1, t2) {
                const r1 = this.resolve(t1);
                const r2 = this.resolve(t2);
                if (this.typeEq(r1, r2)) return;

                if (r1.type === 'Var') {
                    if (this.occursIn(r1.id, r2)) throw new Error("Tip Hatası: Sonsuz tip (occurs check)");
                    this.substitutions.set(r1.id, r2);
                    return;
                }
                if (r2.type === 'Var') {
                    if (this.occursIn(r2.id, r1)) throw new Error("Tip Hatası: Sonsuz tip (occurs check)");
                    this.substitutions.set(r2.id, r1);
                    return;
                }
                if (r1.type === 'Array' && r2.type === 'Array') {
                    this.unify(r1.inner, r2.inner);
                    return;
                }
                if (r1.type === 'Map' && r2.type === 'Map') {
                    this.unify(r1.inner, r2.inner);
                    return;
                }
                if (r1.type === 'Task' && r2.type === 'Task') {
                    this.unify(r1.inner, r2.inner);
                    return;
                }
                if (r1.type === 'Function' && r2.type === 'Function') {
                    if (r1.params.length !== r2.params.length) throw new Error("Tip Hatası: Fonksiyon argüman sayısı uyuşmuyor");
                    for (let i = 0; i < r1.params.length; i++) {
                        this.unify(r1.params[i], r2.params[i]);
                    }
                    this.unify(r1.ret, r2.ret);
                    return;
                }
                throw new Error(`Tip Hatası: ${r1.type} ile ${r2.type} tipleri birleştirilemiyor`);
            }

            freeVars(t) {
                const resolved = this.resolve(t);
                const vars = new Set();
                this.collectFreeVars(resolved, vars);
                return vars;
            }

            collectFreeVars(t, vars) {
                if (t.type === 'Var') {
                    if (this.substitutions.has(t.id)) {
                        this.collectFreeVars(this.substitutions.get(t.id), vars);
                    } else {
                        vars.add(t.id);
                    }
                } else if (t.type === 'Array' || t.type === 'Map' || t.type === 'Task') {
                    this.collectFreeVars(t.inner, vars);
                } else if (t.type === 'Function') {
                    for (let p of t.params) this.collectFreeVars(p, vars);
                    this.collectFreeVars(t.ret, vars);
                }
            }

            freeVarsEnv(env) {
                const vars = new Set();
                let curr = env;
                while (curr) {
                    for (let scheme of curr.bindings.values()) {
                        const schemeFree = this.freeVars(scheme.ty);
                        const quantified = new Set(scheme.vars);
                        for (let v of schemeFree) {
                            if (!quantified.has(v)) {
                                vars.add(v);
                            }
                        }
                    }
                    curr = curr.parent;
                }
                return vars;
            }

            generalize(t, env) {
                const tFree = this.freeVars(t);
                const envFree = this.freeVarsEnv(env);
                const diff = [];
                for (let v of tFree) {
                    if (!envFree.has(v)) {
                        diff.push(v);
                    }
                }
                return { vars: diff, ty: t };
            }

            instantiate(scheme) {
                const mapping = new Map();
                for (let v of scheme.vars) {
                    mapping.set(v, { type: 'Var', id: this.newVar() });
                }

                const subst = (ty) => {
                    if (ty.type === 'Var') {
                        if (mapping.has(ty.id)) return mapping.get(ty.id);
                        return ty;
                    }
                    if (ty.type === 'Array') return { type: 'Array', inner: subst(ty.inner) };
                    if (ty.type === 'Map') return { type: 'Map', inner: subst(ty.inner) };
                    if (ty.type === 'Task') return { type: 'Task', inner: subst(ty.inner) };
                    if (ty.type === 'Function') {
                        return {
                            type: 'Function',
                            params: ty.params.map(subst),
                            ret: subst(ty.ret)
                        };
                    }
                    return ty;
                };
                return subst(scheme.ty);
            }

            inferExpr(expr, env, currentRetTy) {
                switch (expr.type) {
                    case 'Literal':
                        if (typeof expr.val === 'number') return Type.Number;
                        if (typeof expr.val === 'string') return Type.String;
                        if (typeof expr.val === 'boolean') return Type.Boolean;
                        if (expr.val === null) return Type.Bos;
                        throw new Error("Bilinmeyen literal tipi");
                    case 'Identifier': {
                        const scheme = env.get(expr.val);
                        if (!scheme) throw new Error(`Tip Hatası: Tanımlanamayan değişken '${expr.val}'`);
                        return this.instantiate(scheme);
                    }
                    case 'Binary': {
                        const t1 = this.inferExpr(expr.left, env, currentRetTy);
                        const t2 = this.inferExpr(expr.right, env, currentRetTy);
                        switch (expr.op) {
                            case 'Plus':
                                this.unify(t1, t2);
                                const resolved = this.resolve(t1);
                                if (resolved.type === 'Number') return Type.Number;
                                if (resolved.type === 'String') return Type.String;
                                if (resolved.type === 'Var') {
                                    this.substitutions.set(resolved.id, Type.Number);
                                    return Type.Number;
                                }
                                throw new Error("Tip Hatası: Toplama işlemi sadece sayılar veya metinler arasında yapılabilir");
                            case 'Minus':
                            case 'Mul':
                            case 'Div':
                            case 'Mod':
                                this.unify(t1, Type.Number);
                                this.unify(t2, Type.Number);
                                return Type.Number;
                            case 'Eq':
                            case 'Ne':
                                this.unify(t1, t2);
                                return Type.Boolean;
                            case 'Lt':
                            case 'Gt':
                            case 'Le':
                            case 'Ge':
                                this.unify(t1, Type.Number);
                                this.unify(t2, Type.Number);
                                return Type.Boolean;
                            case 'And':
                            case 'Or':
                                this.unify(t1, Type.Boolean);
                                this.unify(t2, Type.Boolean);
                                return Type.Boolean;
                            default:
                                throw new Error(`Bilinmeyen operatör '${expr.op}'`);
                        }
                    }
                    case 'Call': {
                        if (expr.name === 'arkaplanda_çalıştır' || expr.name === 'arkaplanda_calistir') {
                            if (expr.args.length === 0) throw new Error("Tip Hatası: arkaplanda_çalıştır en az bir argüman almalıdır");
                            const fnTy = this.inferExpr(expr.args[0], env, currentRetTy);
                            const paramTys = expr.args.slice(1).map(arg => this.inferExpr(arg, env, currentRetTy));
                            const retVar = this.newVar();
                            const expectedFnTy = {
                                type: 'Function',
                                params: paramTys,
                                ret: { type: 'Var', id: retVar }
                            };
                            this.unify(fnTy, expectedFnTy);
                            return { type: 'Task', inner: this.resolve({ type: 'Var', id: retVar }) };
                        }

                        const fnScheme = env.get(expr.name);
                        if (!fnScheme) throw new Error(`Tip Hatası: Tanımlanamayan işlev '${expr.name}'`);
                        const fnTy = this.instantiate(fnScheme);
                        const argTys = expr.args.map(arg => this.inferExpr(arg, env, currentRetTy));
                        const retVar = this.newVar();
                        const expectedFnTy = {
                            type: 'Function',
                            params: argTys,
                            ret: { type: 'Var', id: retVar }
                        };
                        this.unify(fnTy, expectedFnTy);
                        return this.resolve({ type: 'Var', id: retVar });
                    }
                    case 'Array':
                        for (let el of expr.elements) {
                            this.inferExpr(el, env, currentRetTy);
                        }
                        return { type: 'Array', inner: { type: 'Var', id: this.newVar() } };
                    case 'Map':
                        for (let pair of expr.pairs) {
                            const keyTy = this.inferExpr(pair.key, env, currentRetTy);
                            this.unify(keyTy, Type.String);
                            this.inferExpr(pair.val, env, currentRetTy);
                        }
                        return { type: 'Map', inner: { type: 'Var', id: this.newVar() } };
                    case 'Index': {
                        const arr = this.inferExpr(expr.array, env, currentRetTy);
                        const idx = this.inferExpr(expr.index, env, currentRetTy);
                        const resolvedArr = this.resolve(arr);
                        if (resolvedArr.type === 'Array') {
                            this.unify(idx, Type.Number);
                            return { type: 'Var', id: this.newVar() };
                        }
                        if (resolvedArr.type === 'Map') {
                            this.unify(idx, Type.String);
                            return { type: 'Var', id: this.newVar() };
                        }
                        if (resolvedArr.type === 'Var') {
                            const resVar = this.newVar();
                            const arrayTy = { type: 'Array', inner: { type: 'Var', id: resVar } };
                            this.substitutions.set(resolvedArr.id, arrayTy);
                            this.unify(idx, Type.Number);
                            return { type: 'Var', id: resVar };
                        }
                        throw new Error("Tip Hatası: Sadece diziler ve haritalar indekslenebilir");
                    }
                    case 'HataIse': {
                        const baseTy = this.inferExpr(expr.base, env, currentRetTy);
                        const childEnv = new JSTypeEnv(env);
                        childEnv.set("hata_mesajı", { vars: [], ty: Type.String });
                        childEnv.set("hata_mesaji", { vars: [], ty: Type.String });

                        let bodyTy = Type.Bos;
                        let currentEnv = childEnv;
                        for (let stmt of expr.body) {
                            if (stmt.type === 'ExprStmt') {
                                bodyTy = this.inferExpr(stmt.expr, currentEnv, currentRetTy);
                            } else {
                                this.inferStmt(stmt, currentEnv, currentRetTy);
                                bodyTy = Type.Bos;
                            }
                        }
                        if (!this.typeEq(bodyTy, Type.Bos)) {
                            this.unify(baseTy, bodyTy);
                        }
                        return this.resolve(baseTy);
                    }
                    default:
                        throw new Error(`Bilinmeyen ifade tipi: '${expr.type}'`);
                }
            }

            inferStmt(stmt, env, currentRetTy) {
                switch (stmt.type) {
                    case 'VarDecl': {
                        const valTy = this.inferExpr(stmt.val, env, currentRetTy);
                        const scheme = env.get(stmt.name);
                        if (scheme) {
                            const instantiated = this.instantiate(scheme);
                            this.unify(instantiated, valTy);
                        } else {
                            env.set(stmt.name, { vars: [], ty: valTy });
                        }
                        break;
                    }
                    case 'IndexAssignment': {
                        const arr = this.inferExpr(stmt.array, env, currentRetTy);
                        const idx = this.inferExpr(stmt.index, env, currentRetTy);
                        const val = this.inferExpr(stmt.val, env, currentRetTy);
                        const resolvedArr = this.resolve(arr);
                        if (resolvedArr.type === 'Array') {
                            this.unify(idx, Type.Number);
                        } else if (resolvedArr.type === 'Map') {
                            this.unify(idx, Type.String);
                        } else if (resolvedArr.type === 'Var') {
                            const arrayTy = { type: 'Array', inner: { type: 'Var', id: this.newVar() } };
                            this.substitutions.set(resolvedArr.id, arrayTy);
                            this.unify(idx, Type.Number);
                        } else {
                            throw new Error("Tip Hatası: Sadece diziler ve haritalar güncellenebilir");
                        }
                        break;
                    }
                    case 'If': {
                        const condTy = this.inferExpr(stmt.cond, env, currentRetTy);
                        this.unify(condTy, Type.Boolean);
                        const thenEnv = new JSTypeEnv(env);
                        for (let s of stmt.thenBlock) this.inferStmt(s, thenEnv, currentRetTy);
                        if (stmt.elseBlock) {
                            const elseEnv = new JSTypeEnv(env);
                            for (let s of stmt.elseBlock) this.inferStmt(s, elseEnv, currentRetTy);
                        }
                        break;
                    }
                    case 'While': {
                        const condTy = this.inferExpr(stmt.cond, env, currentRetTy);
                        this.unify(condTy, Type.Boolean);
                        const bodyEnv = new JSTypeEnv(env);
                        for (let s of stmt.body) this.inferStmt(s, bodyEnv, currentRetTy);
                        break;
                    }
                    case 'For': {
                        const start = this.inferExpr(stmt.start, env, currentRetTy);
                        this.unify(start, Type.Number);
                        const end = this.inferExpr(stmt.end, env, currentRetTy);
                        this.unify(end, Type.Number);
                        const bodyEnv = new JSTypeEnv(env);
                        bodyEnv.set(stmt.var, { vars: [], ty: Type.Number });
                        for (let s of stmt.body) this.inferStmt(s, bodyEnv, currentRetTy);
                        break;
                    }
                    case 'FnDecl': {
                        const retVar = this.newVar();
                        const retTy = { type: 'Var', id: retVar };
                        const paramTys = [];
                        const bodyEnv = new JSTypeEnv(env);
                        for (let p of stmt.params) {
                            const pVar = this.newVar();
                            const pTy = { type: 'Var', id: pVar };
                            paramTys.push(pTy);
                            bodyEnv.set(p, { vars: [], ty: pTy });
                        }
                        const fnTy = { type: 'Function', params: paramTys, ret: retTy };
                        bodyEnv.set(stmt.name, { vars: [], ty: fnTy });

                        for (let s of stmt.body) {
                            this.inferStmt(s, bodyEnv, retTy);
                        }

                        const resolvedFn = this.resolve(fnTy);
                        const generalized = this.generalize(resolvedFn, env);
                        env.set(stmt.name, generalized);
                        break;
                    }
                    case 'Return': {
                        if (currentRetTy) {
                            const actualTy = stmt.expr ? this.inferExpr(stmt.expr, env, currentRetTy) : Type.Bos;
                            this.unify(currentRetTy, actualTy);
                        } else {
                            if (stmt.expr) {
                                const actualTy = this.inferExpr(stmt.expr, env, currentRetTy);
                                this.unify(Type.Bos, actualTy);
                            }
                        }
                        break;
                    }
                    case 'ExprStmt':
                        this.inferExpr(stmt.expr, env, currentRetTy);
                        break;
                    case 'Tamamlaninca': {
                        const task = this.inferExpr(stmt.gorev, env, currentRetTy);
                        const taskResVar = this.newVar();
                        const expectedTaskTy = { type: 'Task', inner: { type: 'Var', id: taskResVar } };
                        this.unify(task, expectedTaskTy);

                        const bodyEnv = new JSTypeEnv(env);
                        const resolvedRes = this.resolve({ type: 'Var', id: taskResVar });
                        bodyEnv.set("sonuç", { vars: [], ty: resolvedRes });
                        bodyEnv.set("sonuc", { vars: [], ty: resolvedRes });
                        for (let s of stmt.body) this.inferStmt(s, bodyEnv, currentRetTy);
                        break;
                    }
                }
            }
        }

        function createDefaultTypeEnv(checker) {
            const env = new JSTypeEnv();
            
            // yazdır
            const aYazdir = checker.newVar();
            const yazdirTy = {
                type: 'Function',
                params: [{ type: 'Var', id: aYazdir }],
                ret: Type.Bos
            };
            env.set('yazdır', { vars: [aYazdir], ty: yazdirTy });
            env.set('yazdir', { vars: [aYazdir], ty: yazdirTy });

            // boyut
            const aBoyut = checker.newVar();
            const boyutTy = {
                type: 'Function',
                params: [{ type: 'Var', id: aBoyut }],
                ret: Type.Number
            };
            env.set('boyut', { vars: [aBoyut], ty: boyutTy });

            // ekle
            const aEkle = checker.newVar();
            const ekleTy = {
                type: 'Function',
                params: [{ type: 'Array', inner: { type: 'Var', id: aEkle } }, { type: 'Var', id: aEkle }],
                ret: Type.Bos
            };
            env.set('ekle', { vars: [aEkle], ty: ekleTy });

            // kök
            const kokTy = {
                type: 'Function',
                params: [Type.Number],
                ret: Type.Number
            };
            env.set('kök', { vars: [], ty: kokTy });
            env.set('karekok', { vars: [], ty: kokTy });

            // üs
            const usTy = {
                type: 'Function',
                params: [Type.Number, Type.Number],
                ret: Type.Number
            };
            env.set('üs', { vars: [], ty: usTy });
            env.set('ust', { vars: [], ty: usTy });

            // mutlak
            const mutlakTy = {
                type: 'Function',
                params: [Type.Number],
                ret: Type.Number
            };
            env.set('mutlak', { vars: [], ty: mutlakTy });

            // şimdi
            const simdiTy = {
                type: 'Function',
                params: [],
                ret: Type.Number
            };
            env.set('şimdi', { vars: [], ty: simdiTy });
            env.set('simdi', { vars: [], ty: simdiTy });

            // uyku
            const uykuTy = {
                type: 'Function',
                params: [Type.Number],
                ret: Type.Bos
            };
            env.set('uyku', { vars: [], ty: uykuTy });

            // dosya_oku
            const dosyaOkuTy = {
                type: 'Function',
                params: [Type.String],
                ret: Type.String
            };
            env.set('dosya_oku', { vars: [], ty: dosyaOkuTy });

            // dosya_yaz
            const dosyaYazTy = {
                type: 'Function',
                params: [Type.String, Type.String],
                ret: Type.Boolean
            };
            env.set('dosya_yaz', { vars: [], ty: dosyaYazTy });

            // dosya_sil
            const dosyaSilTy = {
                type: 'Function',
                params: [Type.String],
                ret: Type.Boolean
            };
            env.set('dosya_sil', { vars: [], ty: dosyaSilTy });

            // hata_fırlat
            const aHata = checker.newVar();
            const hataTy = {
                type: 'Function',
                params: [{ type: 'Var', id: aHata }],
                ret: { type: 'Var', id: checker.newVar() }
            };
            env.set('hata_fırlat', { vars: [aHata], ty: hataTy });
            env.set('hata_firlat', { vars: [aHata], ty: hataTy });

            return env;
        }

        // 4.5 Interpreter
        class Env {
            constructor(parent = null) {
                this.bindings = new Map();
                this.parent = parent;
            }

            get(name) {
                if (this.bindings.has(name)) return this.bindings.get(name);
                if (this.parent) return this.parent.get(name);
                return undefined;
            }

            set(name, val) {
                if (this.updateInParent(name, val)) return;
                this.bindings.set(name, val);
            }

            updateInParent(name, val) {
                if (this.bindings.has(name)) {
                    this.bindings.set(name, val);
                    return true;
                }
                if (this.parent) return this.parent.updateInParent(name, val);
                return false;
            }
        }

        class Interpreter {
            constructor(stdoutCallback) {
                this.stdout = stdoutCallback;
                this.env = new Env();
                
                const isMap = (a) => a !== null && typeof a === 'object' && !Array.isArray(a) && !['Builtin', 'Function', 'Task', 'Hata'].includes(a.type);
                
                // Set native builtin print function
                this.env.bindings.set('yazdır', {
                    type: 'Builtin',
                    call: (args) => {
                        const formatVal = (item) => {
                            if (item === null) return 'boş';
                            if (item === true) return 'doğru';
                            if (item === false) return 'yanlış';
                            if (typeof item === 'string') return `"${item}"`;
                            if (Array.isArray(item)) return '[' + item.map(formatVal).join(', ') + ']';
                            if (isMap(item)) {
                                return '{' + Object.entries(item).map(([k, v]) => `${k}: ${formatVal(v)}`).join(', ') + '}';
                            }
                            if (item && item.type === 'Hata') return `Hata("${item.val}")`;
                            if (item && item.type === 'Task') return `Task`;
                            return item.toString();
                        };
                        this.stdout(args.map(a => {
                            if (typeof a === 'string') return a;
                            return formatVal(a);
                        }).join(' '));
                        return null;
                    }
                });

                const addBuiltin = (name, fn) => {
                    this.env.bindings.set(name, {
                        type: 'Builtin',
                        call: fn
                    });
                };

                addBuiltin('boyut', (args) => {
                    if (args.length === 1) {
                        if (Array.isArray(args[0])) return args[0].length;
                        if (isMap(args[0])) return Object.keys(args[0]).length;
                    }
                    return 0;
                });

                addBuiltin('ekle', (args) => {
                    if (args.length === 2 && Array.isArray(args[0])) {
                        args[0].push(args[1]);
                    }
                    return null;
                });

                addBuiltin('hata_fırlat', (args) => {
                    const msg = args.length >= 1 ? args[0] : "Bilinmeyen hata";
                    return { type: 'Hata', val: msg.toString() };
                });

                addBuiltin('dosya_yaz', (args) => {
                    if (args.length === 2) {
                        const path = args[0].toString();
                        const content = args[1].toString();
                        try {
                            localStorage.setItem('tilk_fs_' + path, content);
                            return true;
                        } catch (e) {
                            return { type: 'Hata', val: e.message };
                        }
                    }
                    return { type: 'Hata', val: 'Geçersiz argüman: dosya_yaz(yol, içerik)' };
                });

                addBuiltin('dosya_oku', (args) => {
                    if (args.length === 1) {
                        const path = args[0].toString();
                        const content = localStorage.getItem('tilk_fs_' + path);
                        if (content === null) {
                            return { type: 'Hata', val: `Dosya okunamadı: Dosya bulunamadı: ${path}` };
                        }
                        return content;
                    }
                    return { type: 'Hata', val: 'Geçersiz argüman: dosya_oku(yol)' };
                });

                addBuiltin('dosya_sil', (args) => {
                    if (args.length === 1) {
                        const path = args[0].toString();
                        if (localStorage.getItem('tilk_fs_' + path) === null) {
                            return { type: 'Hata', val: `Dosya silinemedi: Dosya bulunamadı: ${path}` };
                        }
                        localStorage.removeItem('tilk_fs_' + path);
                        return true;
                    }
                    return { type: 'Hata', val: 'Geçersiz argüman: dosya_sil(yol)' };
                });

                addBuiltin('arkaplanda_çalıştır', (args) => {
                    if (args.length >= 1) {
                        const func = args[0];
                        const funcArgs = args.slice(1);
                        return {
                            type: 'Task',
                            completed: false,
                            func: func,
                            args: funcArgs,
                            result: null
                        };
                    }
                    return { type: 'Hata', val: 'Geçersiz argüman: arkaplanda_çalıştır(işlev, ...)' };
                });
                this.env.bindings.set('arkaplanda_calistir', this.env.bindings.get('arkaplanda_çalıştır'));

                addBuiltin('kök', (args) => {
                    if (args.length === 1 && typeof args[0] === 'number') {
                        if (args[0] >= 0) return Math.sqrt(args[0]);
                        return { type: 'Hata', val: 'Negatif sayının karekökü alınamaz' };
                    }
                    return { type: 'Hata', val: 'Geçersiz argüman: kök(sayı)' };
                });
                this.env.bindings.set('karekok', this.env.bindings.get('kök'));

                addBuiltin('üs', (args) => {
                    if (args.length === 2 && typeof args[0] === 'number' && typeof args[1] === 'number') {
                        return Math.pow(args[0], args[1]);
                    }
                    return { type: 'Hata', val: 'Geçersiz argüman: üs(taban, üs)' };
                });
                this.env.bindings.set('ust', this.env.bindings.get('üs'));

                addBuiltin('mutlak', (args) => {
                    if (args.length === 1 && typeof args[0] === 'number') {
                        return Math.abs(args[0]);
                    }
                    return { type: 'Hata', val: 'Geçersiz argüman: mutlak(sayı)' };
                });

                addBuiltin('şimdi', (args) => {
                    return Date.now() / 1000;
                });
                this.env.bindings.set('simdi', this.env.bindings.get('şimdi'));

                addBuiltin('uyku', (args) => {
                    if (args.length === 1 && typeof args[0] === 'number') {
                        const ms = args[0];
                        const start = Date.now();
                        while (Date.now() - start < ms) {}
                        return null;
                    }
                    return { type: 'Hata', val: 'Geçersiz argüman: uyku(milisaniye)' };
                });
            }

            run(stmts) {
                for (let stmt of stmts) {
                    const res = this.evalStmt(stmt, this.env);
                    if (res && res.returned) {
                        return res.val;
                    }
                }
                return null;
            }

            evalExpr(expr, env) {
                switch (expr.type) {
                    case 'Literal':
                        return expr.val;
                    case 'Identifier':
                        const val = env.get(expr.val);
                        if (val === undefined) throw new Error(`Tanımlanamayan değişken '${expr.val}'`);
                        return val;
                    case 'Array':
                        return expr.elements.map(el => this.evalExpr(el, env));
                    case 'Map':
                        const obj = {};
                        for (let pair of expr.pairs) {
                            const k = this.evalExpr(pair.key, env);
                            if (k && k.type === 'Hata') return k;
                            if (typeof k !== 'string') throw new Error("HATA: Harita anahtarı metin (string) olmak zorundadır");
                            const v = this.evalExpr(pair.val, env);
                            if (v && v.type === 'Hata') return v;
                            obj[k] = v;
                        }
                        return obj;
                    case 'Index':
                        const arr = this.evalExpr(expr.array, env);
                        if (arr && arr.type === 'Hata') return arr;
                        const idx = this.evalExpr(expr.index, env);
                        if (idx && idx.type === 'Hata') return idx;
                        
                        const isMapObj = (a) => a !== null && typeof a === 'object' && !Array.isArray(a) && !['Builtin', 'Function', 'Task', 'Hata'].includes(a.type);
                        
                        if (Array.isArray(arr)) {
                            if (typeof idx !== 'number') throw new Error("HATA: Dizi indeksi sayı olmalıdır");
                            const i = Math.floor(idx);
                            if (i < 0 || i >= arr.length) throw new Error(`HATA: Dizi sınırları dışında: indeks ${i}, boyut ${arr.length}`);
                            return arr[i];
                        } else if (isMapObj(arr)) {
                            if (typeof idx !== 'string') throw new Error("HATA: Harita indeksi metin (string) olmalıdır");
                            return arr[idx] === undefined ? null : arr[idx];
                        }
                        throw new Error("HATA: Sadece diziler ve haritalar indekslenebilir");
                    case 'HataIse':
                        const baseVal = this.evalExpr(expr.base, env);
                        if (baseVal && baseVal.type === 'Hata') {
                            const childEnv = new Env(env);
                            childEnv.bindings.set('hata_mesajı', baseVal.val);
                            childEnv.bindings.set('hata_mesaji', baseVal.val);
                            const res = this.evalBlock(expr.body, childEnv);
                            return res ? res.val : null;
                        }
                        return baseVal;
                    case 'Binary':
                        const left = this.evalExpr(expr.left, env);
                        if (left && left.type === 'Hata') return left;
                        const right = this.evalExpr(expr.right, env);
                        if (right && right.type === 'Hata') return right;
                        switch (expr.op) {
                            case 'Plus': return left + right;
                            case 'Minus': return left - right;
                            case 'Mul': return left * right;
                            case 'Div': 
                                if (right === 0) throw new Error("Sıfıra bölme hatası");
                                return left / right;
                            case 'Mod': return left % right;
                            case 'Eq': return left === right;
                            case 'Ne': return left !== right;
                            case 'Lt': return left < right;
                            case 'Gt': return left > right;
                            case 'Le': return left <= right;
                            case 'Ge': return left >= right;
                            case 'And': return left && right;
                            case 'Or': return left || right;
                            default: throw new Error(`Bilinmeyen operatör '${expr.op}'`);
                        }
                    case 'Call':
                        const func = env.get(expr.name);
                        if (!func) throw new Error(`Tanımlanamayan işlev '${expr.name}'`);
                        
                        const args = expr.args.map(a => this.evalExpr(a, env));
                        // Propagate error from arguments
                        for (let arg of args) {
                            if (arg && arg.type === 'Hata') return arg;
                        }
                        if (func.type === 'Builtin') {
                            return func.call(args);
                        } else if (func.type === 'Function') {
                            if (func.params.length !== args.length) {
                                throw new Error(`HATA: '${expr.name}' işlevi ${func.params.length} argüman bekliyor fakat ${args.length} verildi`);
                            }
                            const childEnv = new Env(env);
                            for (let i = 0; i < func.params.length; i++) {
                                childEnv.bindings.set(func.params[i], args[i]);
                            }
                            const res = this.evalBlock(func.body, childEnv);
                            return res ? res.val : null;
                        }
                        throw new Error(`'${expr.name}' çağrılabilir bir değer değil`);
                }
            }

            evalStmt(stmt, env) {
                switch (stmt.type) {
                    case 'VarDecl':
                        const v = this.evalExpr(stmt.val, env);
                        env.set(stmt.name, v);
                        return null;
                    case 'IndexAssignment':
                        const target = this.evalExpr(stmt.array, env);
                        if (target && target.type === 'Hata') return target;
                        const index = this.evalExpr(stmt.index, env);
                        if (index && index.type === 'Hata') return index;
                        const value = this.evalExpr(stmt.val, env);
                        if (value && value.type === 'Hata') return value;

                        const isMapObj2 = (a) => a !== null && typeof a === 'object' && !Array.isArray(a) && !['Builtin', 'Function', 'Task', 'Hata'].includes(a.type);

                        if (Array.isArray(target)) {
                            if (typeof index !== 'number') throw new Error("HATA: Dizi indeksi sayı olmalıdır");
                            const i = Math.floor(index);
                            if (i < 0 || i >= target.length) throw new Error(`HATA: Dizi sınırları dışında güncelleme: indeks ${i}, boyut ${target.length}`);
                            target[i] = value;
                        } else if (isMapObj2(target)) {
                            if (typeof index !== 'string') throw new Error("HATA: Harita indeksi metin (string) olmalıdır");
                            target[index] = value;
                        } else {
                            throw new Error("HATA: Sadece diziler ve haritalar güncellenebilir");
                        }
                        return null;
                    case 'ExprStmt':
                        this.evalExpr(stmt.expr, env);
                        return null;
                    case 'If':
                        const cond = this.evalExpr(stmt.cond, env);
                        if (cond && cond.type === 'Hata') return cond;
                        if (cond === true) {
                            return this.evalBlock(stmt.thenBlock, env);
                        } else if (stmt.elseBlock) {
                            return this.evalBlock(stmt.elseBlock, env);
                        }
                        return null;
                    case 'While':
                        while (true) {
                            const condition = this.evalExpr(stmt.cond, env);
                            if (condition && condition.type === 'Hata') return condition;
                            if (condition !== true) break;
                            const res = this.evalBlock(stmt.body, env);
                            if (res && res.returned) return res;
                        }
                        return null;
                    case 'For':
                        const start = this.evalExpr(stmt.start, env);
                        const end = this.evalExpr(stmt.end, env);
                        if (start && start.type === 'Hata') return start;
                        if (end && end.type === 'Hata') return end;
                        if (typeof start !== 'number' || typeof end !== 'number') {
                            throw new Error("Döngü aralık sınırları sayı olmalıdır");
                        }
                        
                        let i = start;
