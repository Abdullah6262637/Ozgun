                        while (stmt.stepDir === 'Artarak' ? i <= end : i >= end) {
                            const childEnv = new Env(env);
                            childEnv.bindings.set(stmt.var, i);
                            
                            const res = this.evalBlock(stmt.body, childEnv);
                            if (res && res.returned) return res;

                            if (stmt.stepDir === 'Artarak') i++;
                            else i--;
                        }
                        return null;
                    case 'FnDecl':
                        env.bindings.set(stmt.name, {
                            type: 'Function',
                            params: stmt.params,
                            body: stmt.body
                        });
                        return null;
                    case 'Return':
                        const retVal = stmt.expr ? this.evalExpr(stmt.expr, env) : null;
                        return { returned: true, val: retVal };
                    case 'Tamamlaninca':
                        const taskVal = this.evalExpr(stmt.gorev, env);
                        if (taskVal && taskVal.type === 'Hata') return taskVal;
                        let resultVal;
                        if (taskVal && taskVal.type === 'Task') {
                            if (!taskVal.completed) {
                                const func = taskVal.func;
                                const args = taskVal.args;
                                if (func && func.type === 'Function') {
                                    const childEnv = new Env(env);
                                    for (let i = 0; i < func.params.length; i++) {
                                        childEnv.bindings.set(func.params[i], args[i]);
                                    }
                                    const res = this.evalBlock(func.body, childEnv);
                                    taskVal.result = res ? res.val : null;
                                } else if (func && func.type === 'Builtin') {
                                    taskVal.result = func.call(args);
                                } else {
                                    throw new Error("HATA: Görev çağrılabilir bir işlev içermiyor");
                                }
                                taskVal.completed = true;
                            }
                            resultVal = taskVal.result;
                        } else {
                            resultVal = taskVal;
                        }
                        const childEnv = new Env(env);
                        childEnv.bindings.set('sonuç', resultVal);
                        childEnv.bindings.set('sonuc', resultVal);
                        return this.evalBlock(stmt.body, childEnv);
                }
            }

            evalBlock(body, env) {
                const childEnv = new Env(env);
                for (let stmt of body) {
                    const res = this.evalStmt(stmt, childEnv);
                    if (res && (res.returned || (res.type === 'Hata'))) return res;
                }
                return null;
            }
        }

        // --- 5. EXECUTION & BUTTON LISTENERS ---
        const runBtn = document.getElementById('runBtn');
        const consoleOutput = document.getElementById('consoleOutput');
        const astOutput = document.getElementById('astOutput');
        const tokenOutput = document.getElementById('tokenOutput');

        runBtn.addEventListener('click', () => {
            consoleOutput.innerHTML = '';
            const code = codeEditor.value;

            try {
                // 1. Tokenize
                const tokens = tokenize(code);
                
                // Show Tokens visually
                tokenOutput.innerHTML = tokens.map(t => `
                    <tr>
                        <td style="color: var(--color-primary);">${t.type}</td>
                        <td>${t.val}</td>
                    </tr>
                `).join('');

                // 2. Parse
                const parser = new Parser(tokens);
                const ast = parser.parse();

                // Show AST visually
                astOutput.innerHTML = JSON.stringify(ast, null, 4);

                // 2.5 Static Type Checker
                const typeChecker = new JSTypeChecker();
                const typeEnv = createDefaultTypeEnv(typeChecker);
                for (let stmt of ast) {
                    typeChecker.inferStmt(stmt, typeEnv, null);
                }

                // 3. Interpret / Run
                const interpreter = new Interpreter((txt) => {
                    const logSpan = document.createElement('span');
                    logSpan.className = 'console-log';
                    logSpan.textContent = txt + '\n';
                    consoleOutput.appendChild(logSpan);
                });

                interpreter.run(ast);

                if (consoleOutput.innerHTML === '') {
                    consoleOutput.innerHTML = '<span style="color: var(--text-muted);">Program çalıştırıldı, herhangi bir çıktı vermedi.</span>';
                }

            } catch (err) {
                const errSpan = document.createElement('span');
                errSpan.className = 'console-error';
                errSpan.textContent = err.message;
                consoleOutput.appendChild(errSpan);
            }
        });
    </script>
</body>
